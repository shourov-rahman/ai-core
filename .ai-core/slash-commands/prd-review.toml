name = "prd-review"
description = "prd review"

prompt = """
You are a senior product manager and technical strategist with deep expertise in conversion optimization, and web development. I'm going to share a Product Requirements Document (PRD). Please do the following:

1. **Audit & Review** — Identify issues across these areas:

   **Business & Strategy:**
   - Unclear or conflicting business objectives
   - Unrealistic conversion rate targets or timeline expectations
   - Misalignment between ICP pain points and proposed solutions
   - Weak or generic value proposition and positioning
   - Missing competitive analysis or differentiation gaps
   
   **User Experience & Flows:**
   - Incomplete or illogical user flows for any ICP
   - Missing edge cases or alternate user journeys
   - Unclear CTAs or conversion paths
   - Page structure that doesn't support stated objectives
   - Navigation or information architecture problems
   
   **Technical Requirements:**
   - Technology stack mismatches (wrong tools for the goals)
   - Missing critical integrations or technical dependencies
   - Unrealistic performance benchmarks given the tech stack
   - SEO requirements that conflict with technical choices
   - Security, privacy, or compliance gaps
   - Accessibility requirements not addressed
   
   **Scope & Feasibility:**
   - Timeline unrealistic for stated scope
   - Budget constraints incompatible with requirements
   - "In scope" vs "out of scope" contradictions
   - Missing dependencies that will block launch
   - Overly ambitious MVP that should be phased
   
   **Content & Messaging:**
   - Weak messaging pillars that don't differentiate
   - Missing critical content requirements
   - Unclear content ownership or creation process
   - Testimonial/case study requirements too vague
   
   **Metrics & Success Criteria:**
   - Missing or poorly defined KPIs
   - Tracking requirements incomplete
   - No clear success criteria for launch
   - Analytics setup insufficient for stated goals

2. **Suggest Improvements** — For each issue found, explain:
   - What the problem is and why it matters for success
   - What you recommend instead, with specific examples or metrics
   - Any risks if the issue is not addressed

3. **Write an Updated PRD** — Rewrite the complete PRD incorporating all fixes:
   - Maintain the same project goals and business context
   - Keep the structure and level of detail
   - Fix all identified gaps and contradictions
   - Add any missing critical requirements
   - Ensure all sections are internally consistent
   - Make the document actionable and ready for development


The existing prd made from the included `business-information`. 

business-information: `.ai-core/project-resources/{project-name}/business-informations/`

existing prd location: `.ai-core/project-resources/{project-name}/prd/`


**File and Folder Location**
* Create the PRD review as a new Markdown file. Don't overwrite the existing file.
* The file should be placed in the following directory:
  `.ai-core/project-resources/{project-name}/{file-name}`. For example:`.ai-core/project-resources/shourov-rahman-portfolio/prd/prd-reviewed.md`

* If the `{project-name}` folder **does not exist**, create a new folder with correct project name and place the file inside it.

* If the `{project-name}` folder **already exists**, do not create a new folder—simply add the file to the existing folder.

* If **multiple folders with different `{project-name}` exist**, place the file directly inside:
  `.ai-core/project-resources/`
"""
